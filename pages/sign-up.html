<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign Up | Dental Clinic</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../css/main.css">
        <link rel="icon" type="image/x-icon" href="../assets/icons/tooth-logo.webp">
    </head>
    <body class="signup-page">
        <main>
            <div class="card">
                <section aria-labelledby="signup-heading">

                    <header class="card-header">
                        <a href="../index.html" class="back-home">← Home</a>
                        <h1 id="signup-heading">Create Account</h1>
                        <div class="divider" aria-hidden="true"></div>
                    </header>

                    <form id="signup-form" method="post" action="#" novalidate>

                        <fieldset>
                            <legend>Personal information</legend>

                            <div class="field">
                                <label for="full-name">Full name</label>
                                <input
                                    type="text"
                                    id="full-name"
                                    name="full_name"
                                    placeholder="Jane Smith"
                                    autocomplete="name"
                                    aria-required="true"
                                    aria-describedby="full-name-error"
                                />
                                <p class="field-error" id="full-name-error" role="alert" aria-live="polite"></p>
                            </div>

                            <div class="field">
                                <label for="email">Email address</label>
                                <input
                                    type="email"
                                    id="email"
                                    name="email"
                                    placeholder="jane@example.com"
                                    autocomplete="email"
                                    aria-required="true"
                                    aria-describedby="email-error"
                                />
                                <p class="field-error" id="email-error" role="alert" aria-live="polite"></p>
                            </div>

                            <div class="field">
                                <label for="password">Password</label>
                                <input
                                    type="password"
                                    id="password"
                                    name="password"
                                    placeholder="••••••••••••"
                                    autocomplete="new-password"
                                    aria-required="true"
                                    aria-describedby="password-error"
                                />
                                <p class="field-error" id="password-error" role="alert" aria-live="polite"></p>
                            </div>

                            <div class="field">
                                <label for="confirm-password">Confirm password</label>
                                <input
                                    type="password"
                                    id="confirm-password"
                                    name="confirm_password"
                                    placeholder="••••••••••••"
                                    autocomplete="new-password"
                                    aria-required="true"
                                    aria-describedby="confirm-password-error"
                                />
                                <p class="field-error" id="confirm-password-error" role="alert" aria-live="polite"></p>
                            </div>
                        </fieldset>

                        <button type="submit">
                            <span>Create Account</span>
                        </button>

                    </form>

                    <footer class="card-footer">
                        <p>Already have an account? <a href="login.html">Log In</a></p>
                    </footer>
                </section>
            </div>
        </main>
    </body>
</html>
